spring.application.name=secure-notes

spring.datasource.url=jdbc:mysql://localhost:3306/securenotes?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

spring.app.jwtSecret=secretsecretsecretsecretsecretsecretsecretsecret
spring.app.jwtExpirationMs=360000000

spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

frontend.url=http://localhost:3000

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

