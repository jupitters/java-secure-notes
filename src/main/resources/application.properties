spring.application.name=secure-notes

spring.datasource.url=jdbc:mysql://localhost:3306/securenotes?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

spring.app.jwtSecret=${SPRING_APP_JWT_SECRET}
spring.app.jwtExpirationMs=${SPRING_APP_JWT_EXPIRATION_MS}

spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
